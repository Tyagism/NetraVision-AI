version: '3.8'

services:
  netravision-ai:
    build: .
    container_name: netravision-ai-app
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./audio_cache:/app/audio_cache
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
